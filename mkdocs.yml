site_name: ShowTrials
site_description: Sistema de Gestão de Documentos Históricos
site_author: Thiago Ribeiro
repo_url: https://github.com/rib-thiago/showtrials-tcc
repo_name: showtrials-tcc
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 3

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Início: index.md
  - Visão Geral: overview.md
  - Arquitetura: ARCHITECTURE.md

  - Fases do Projeto:
    - FASE 01 - Dominio: fases/FASE01_FUNDACAO_DA_CAMADA_DE_DOMINIO.md
    - FASE 02 - Aplicacao: fases/FASE02_FUNDACAO_DA_CAMADA_DE_APLICACAO.md
    - FASE 03 - Infraestrutura: fases/FASE03_FUNDACAO_DA_CAMADA_DE_INFRAESTRUTURA.md
    - FASE 04 - Interface CLI: fases/FASE04_FUNDACAO_DA_INTERFACE_CLI.md
    - FASE 05 - Traducao: fases/FASE05_INTRODUCAO_DO_SUBSISTEMA_DE_TRADUCAO.md
    - FASE 06 - Exportacao: fases/FASE06_INTRODUCAO_DO_SUBSISTEMA_DE_EXPORTACAO.md
    - FASE 07 - Relatorios: fases/FASE07_INTRODUCAO_DO_SUBSISTEMA_DE_RELATORIOS.md
    - FASE 08 - Analise de Texto: fases/FASE08_INTRODUCAO_DO_SUBSISTEMA_DE_ANALISE_DE_TEXTO.md
    - FASE 09 - Interface Web: fases/FASE09_INTRODUCAO_DA_INTERFACE_WEB.md
    - FASE 10 - Service Registry: fases/FASE10_INTRODUCAO_DO_SERVICE_REGISTRY_E_DO_LAZY_LOADING.md
    - FASE 11 - CI: fases/FASE11_ESTABILIZACAO_INICIAL_DO_CI.md
    - FASE 12 - Telemetria em TipoDocumento: fases/FASE12_PADRONIZACAO_DA_TELEMETRIA_EM_TIPODOCUMENTO.md
    - FASE 13 - Limpeza do Repositorio: fases/FASE13_LIMPEZA_E_ORGANIZACAO_DO_REPOSITORIO.md
    - FASE 14 - ExportarDocumento: fases/FASE14_TELEMETRIA_E_TESTES_EM_EXPORTAR_DOCUMENTO.md
    - FASE 15 - GerarRelatorio: fases/FASE15_TELEMETRIA_E_TESTES_EM_GERAR_RELATORIO.md
    - FASE 16 - ListarDocumentos: fases/FASE16_TELEMETRIA_E_EXPANSAO_DE_TESTES_EM_LISTAR_DOCUMENTOS.md
    - FASE 17 - Reorganizacao Documental: fases/FASE17_PRIMEIRA_REORGANIZACAO_DOCUMENTAL_AMPLA.md
    - FASE 18 - Governanca: fases/FASE18_CONSOLIDACAO_DA_GOVERNANCA.md
    - FASE 19 - Fluxo de Qualidade: fases/FASE19_CONSOLIDACAO_DO_FLUXO_DE_QUALIDADE.md

